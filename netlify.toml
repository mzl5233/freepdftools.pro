[build]
  publish = "dist"
  command = "npm run build"

[[headers]]
  for = "/*.js"
    [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.jsx"
    [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.css"
    [headers.values]
    Content-Type = "text/css; charset=utf-8"

# SPA路由处理
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 